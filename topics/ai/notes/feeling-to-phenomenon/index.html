<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>把感觉翻译成现象 | Evan Speak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f4efe5;
        --ink: #24201b;
        --muted: #716d65;
        --line: rgba(77, 70, 60, 0.17);
        --blue: #7f99af;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scrollbar-width: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: Inter, "Noto Serif SC", "Microsoft YaHei", sans-serif;
        -ms-overflow-style: none;
        scrollbar-width: none;
        background:
          radial-gradient(circle at 18% 10%, rgba(127, 153, 175, 0.18), transparent 28%),
          linear-gradient(135deg, #f8f3ea 0%, var(--paper) 100%);
      }

      .intro {
        width: min(1180px, calc(100vw - 44px));
        margin: 0 auto;
        padding: 30px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 34px;
        color: var(--muted);
        font-size: 14px;
      }

      .crumbs {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .crumbs a,
      .back-link {
        border-bottom: 1px solid rgba(36, 32, 27, 0.28);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 44px;
        align-items: end;
        padding-bottom: 32px;
        border-bottom: 1px solid var(--line);
      }

      .reveal {
        opacity: 0;
        transform: translateY(34px);
        transition:
          opacity 760ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 760ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .kicker::before {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--blue);
        content: "";
      }

      h1 {
        margin: 0 0 18px;
        font-family: "Noto Serif SC", serif;
        font-size: clamp(34px, 5vw, 64px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .summary {
        max-width: 740px;
        margin: 0;
        color: #5f5c56;
        font-family: "Noto Serif SC", serif;
        font-size: 16px;
        line-height: 1.9;
      }

      .meta {
        display: grid;
        gap: 14px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.28);
        color: var(--muted);
        font-size: 13px;
      }

      .meta strong {
        display: block;
        margin-bottom: 4px;
        color: var(--ink);
        font-family: "Noto Serif SC", serif;
        font-size: 15px;
      }

      .embed-shell {
        width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-top: 0;
        overflow: clip;
        border: 0;
        border-radius: 0;
        background: #071019;
        box-shadow: none;
      }

      .embed-shell.reveal {
        transform: translateY(72px);
        transition:
          opacity 900ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 900ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .embed-shell.reveal.is-visible {
        transform: translateY(0);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        background: #071019;
      }

      @media (prefers-reduced-motion: reduce) {
        .reveal,
        .embed-shell.reveal {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }

      @media (max-width: 820px) {
        .intro {
          width: min(100vw - 24px, 1180px);
          padding-top: 22px;
        }

        .topbar,
        .hero {
          grid-template-columns: 1fr;
        }

        .hero {
          gap: 24px;
        }

        iframe {
          min-height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="intro">
        <nav class="topbar" aria-label="面包屑导航">
          <div class="crumbs">
            <a href="../../../../">Evan Speak</a>
            <span>/</span>
            <a href="../../">AI</a>
            <span>/</span>
            <a href="../">相关笔记</a>
          </div>
          <a class="back-link" href="../">返回 AI 笔记</a>
        </nav>

        <section class="hero reveal">
          <div>
            <div class="kicker">AI / 感受工程 / 嵌入笔记</div>
            <h1>把感觉翻译成现象</h1>
            <p class="summary">
              一份关于 AI 时代表达能力的思考：当生成能力变便宜，真正稀缺的是把主观感受拆解为结构、现象、参数与可执行系统的能力。
            </p>
          </div>

          <aside class="meta" aria-label="笔记信息">
            <div>
              <strong>内容状态</strong>
              待整理
            </div>
            <div>
              <strong>原始文件</strong>
              content.html
            </div>
            <div>
              <strong>处理方式</strong>
              下滑进入原始页面，外层只保留导航与转场
            </div>
          </aside>
        </section>
      </div>

      <section class="embed-shell reveal" aria-label="嵌入的原始内容">
        <iframe
          id="contentFrame"
          src="content.html"
          title="把感觉翻译成现象原始内容"
          loading="lazy"
        ></iframe>
      </section>
    </main>
    <script>
      const revealItems = document.querySelectorAll(".reveal");

      if ("IntersectionObserver" in window) {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.18, rootMargin: "0px 0px -8% 0px" }
        );

        revealItems.forEach((item) => observer.observe(item));
      } else {
        revealItems.forEach((item) => item.classList.add("is-visible"));
      }

      const contentFrame = document.querySelector("#contentFrame");
      let frameResizeObserver;

      function resizeContentFrame() {
        try {
          if (!contentFrame?.contentDocument) return;

          const frameDocument = contentFrame.contentDocument;
          const frameRoot = frameDocument.documentElement;
          const frameBody = frameDocument.body;
          const contentPage = frameDocument.querySelector(".page");
          const contentBottom = contentPage
            ? contentPage.getBoundingClientRect().bottom + frameDocument.defaultView.scrollY
            : 0;
          const height = Math.ceil(
            Math.max(
              frameRoot.scrollHeight,
              frameRoot.offsetHeight,
              frameBody ? frameBody.scrollHeight : 0,
              frameBody ? frameBody.offsetHeight : 0,
              contentBottom
            )
          );

          contentFrame.style.height = `${height}px`;

          if (!frameDocument.querySelector("#embedded-scrollbar-style")) {
            const style = frameDocument.createElement("style");
            style.id = "embedded-scrollbar-style";
            style.textContent = `
              html, body {
                scrollbar-width: none !important;
                -ms-overflow-style: none !important;
              }

              html::-webkit-scrollbar,
              body::-webkit-scrollbar {
                width: 0 !important;
                height: 0 !important;
                display: none !important;
              }
            `;
            frameDocument.head.appendChild(style);
          }
        } catch (error) {
          contentFrame.style.height = "100vh";
        }
      }

      contentFrame.addEventListener("load", () => {
        resizeContentFrame();
        requestAnimationFrame(resizeContentFrame);
        setTimeout(resizeContentFrame, 300);
        setTimeout(resizeContentFrame, 1200);

        try {
          frameResizeObserver?.disconnect();
          const frameDocument = contentFrame.contentDocument;
          const observedTarget = frameDocument.querySelector(".page") || frameDocument.body;
          frameResizeObserver = new ResizeObserver(resizeContentFrame);
          frameResizeObserver.observe(observedTarget);
        } catch (error) {
          frameResizeObserver = undefined;
        }
      });

      window.addEventListener("resize", resizeContentFrame);
    </script>
  </body>
</html>
