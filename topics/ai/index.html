<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI | Evan Speak</title>
    <style>
      body { margin: 0; min-height: 100vh; font-family: "Noto Serif SC", "Microsoft YaHei", serif; color: #24201b; background: #f4efe5; }
      main { width: min(920px, calc(100vw - 40px)); margin: 0 auto; padding: 64px 0; }
      nav { margin-bottom: 48px; color: #716d65; font-size: 14px; }
      nav a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(36, 32, 27, 0.3); }
      h1 { margin: 0 0 18px; font-size: 56px; line-height: 1.05; }
      .lead { margin: 0 0 42px; color: #716d65; font-size: 17px; line-height: 1.9; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { display: grid; gap: 10px; min-height: 150px; padding: 24px 26px; color: inherit; text-decoration: none; border: 1px solid rgba(77, 70, 60, 0.16); border-radius: 8px; background: rgba(255, 255, 255, 0.28); }
      .card:hover { border-color: rgba(77, 70, 60, 0.34); }
      .card strong { font-size: 24px; }
      .card span { color: #716d65; line-height: 1.8; }
      .status { width: fit-content; padding: 4px 10px; border-radius: 999px; background: rgba(127, 153, 175, 0.18); color: #526a7d; font-size: 13px; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 44px; } }
    </style>
  </head>
  <body>
    <main>
      <nav><a href="../../">Evan Speak</a></nav>
      <h1>AI</h1>
      <p class="lead">探索人工智能的本质、能力边界与演化路径，也收纳与 AI 时代能力变化相关的个人思考。</p>

      <section class="grid" aria-label="AI 分类入口">
        <a class="card" href="notes/">
          <strong>相关笔记</strong>
          <span>已经整理进 AI 分类的思考内容。</span>
          <span class="status">1 篇</span>
        </a>
        <a class="card" href="paths/">
          <strong>相关路径</strong>
          <span>围绕 AI 主题的连续阅读路径。</span>
          <span class="status">待更新</span>
        </a>
      </section>
    </main>
  </body>
</html>
